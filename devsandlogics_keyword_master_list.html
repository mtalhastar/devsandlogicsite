let catFilter = "All";
let intentFilter = "All";
let sortCol = "vol";
let sortDir = -1;

function volSort(v) {
  if (!v) return 0;
  return parseInt(v.replace(/,/g,"")) || 0;
}
function diffSort(d) { return {Low:1,Medium:2,High:3}[d]||0; }

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  render();
}

function render() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  let rows = data.filter(r => {
    const matchQ = !q || r.kw.toLowerCase().includes(q) || r.cat.toLowerCase().includes(q) || r.page.toLowerCase().includes(q);
    const matchCat = catFilter === "All" || r.cat === catFilter;
    const matchIntent = intentFilter === "All" || r.intent === intentFilter;
    return matchQ && matchCat && matchIntent;
  });

  rows.sort((a,b) => {
    let av, bv;
    if (sortCol === "vol") { av = volSort(a.vol); bv = volSort(b.vol); }
    else if (sortCol === "diff") { av = diffSort(a.diff); bv = diffSort(b.diff); }
    else { av = a.kw.toLowerCase(); bv = b.kw.toLowerCase(); return sortDir === 1 ? (av>bv?1:-1) : (av<bv?1:-1); }
    return sortDir * (av - bv);
  });

  const tbody = document.getElementById("tbody");
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No keywords match your filters.</td></tr>';
  } else {
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td class="kw">${r.kw}</td>
        <td class="vol">${r.vol}/mo</td>
        <td><span class="badge diff-${r.diff.toLowerCase()}">${r.diff}</span></td>
        <td><span class="badge intent-${r.intent.toLowerCase()}">${r.intent}</span></td>
        <td><span class="cat-badge" style="background:${CATS[r.cat]};color:${CAT_TEXT[r.cat]}">${r.cat}</span></td>
        <td style="font-size:12px;color:var(--color-text-secondary)">${r.page}</td>
      </tr>
    `).join("");
  }

  const stats = document.getElementById("stats");
  const total = rows.length;
  const trans = rows.filter(r=>r.intent==="Transactional").length;
  const low = rows.filter(r=>r.diff==="Low").length;
  stats.innerHTML = `
    <div class="stat"><strong>${total}</strong> keywords shown</div>
    <div class="stat"><strong>${trans}</strong> transactional</div>
    <div class="stat"><strong>${low}</strong> low difficulty</div>
    <div class="stat"><strong>${rows.filter(r=>r.diff==="Medium").length}</strong> medium difficulty</div>
    <div class="stat"><strong>${rows.filter(r=>r.diff==="High").length}</strong> high difficulty</div>
  `;
}

function buildFilters() {
  const cats = ["All", ...Object.keys(CATS)];
  const intents = ["All", "Transactional", "Commercial", "Informational"];

  document.getElementById("catFilters").innerHTML = cats.map(c =>
    `<button class="filter-btn ${catFilter===c?'active':''}" onclick="catFilter='${c}';renderCatBtns();render()">${c}</button>`
  ).join("");

  document.getElementById("intentFilters").innerHTML = intents.map(i =>
    `<button class="filter-btn ${intentFilter===i?'active':''}" onclick="intentFilter='${i}';renderIntentBtns();render()">${i}</button>`
  ).join("");
}

function renderCatBtns() {
  document.querySelectorAll("#catFilters .filter-btn").forEach(b => {
    b.classList.toggle("active", b.textContent === catFilter);
  });
}
function renderIntentBtns() {
  document.querySelectorAll("#intentFilters .filter-btn").forEach(b => {
    b.classList.toggle("active", b.textContent === intentFilter);
  });
}

buildFilters();
render();
</script>
